set timeout=1
set default=0

# On UEFI: keep GOP framebuffer GRUB already set up.
# On BIOS:  ask GRUB to set a specific VBE mode.
# Either way the Multiboot2 framebuffer tag delivers the linear buffer to the kernel.
if [ "${grub_platform}" = "efi" ]; then
    set gfxpayload=keep
else
    set gfxpayload=1920x1080x32
fi

menuentry "ElseaOS" {
    multiboot2 /boot/elsea.bin
    module2    /boot/initrd.tar ""
    boot
}
